<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">Résumé preview placeholder</title>
  <desc id="desc">Abstract square résumé preview image with simple section lines and blocks.</desc>
  <defs>
    <linearGradient id="page" x1="34" y1="22" x2="146" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="0.58" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="44" y1="34" x2="144" y2="114" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
